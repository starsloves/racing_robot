lidar_obstacle_circle_markers:
  ros__parameters:
    scan_topic: /scan
    marker_topic: obstacle_circle_markers
    cluster_distance_threshold: 0.18
    min_cluster_points: 3
    min_range: 0.10
    max_range: 2.50
    obstacle_padding: 0.04
    min_obstacle_diameter: 0.33
    max_circle_radius: 0.50
    max_cluster_span: 0.90
    marker_height: 0.05
    color_r: 1.0
    color_g: 1.0
    color_b: 1.0
    color_a: 0.90