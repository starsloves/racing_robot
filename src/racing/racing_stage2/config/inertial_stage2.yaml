stage2_inertial_navigator:
  ros__parameters:
    phase_topic: competition_phase
    task_topic: competition_qr_task
    odom_topic: /odom_combined
    imu_topic: /imu/data
    map_topic: /map
    scan_topic: /scan
    cmd_topic: /stage2_cmd_vel
    corridor_path_topic: /stage2_corridor_path
    feedback_topic: competition_feedback
    state_topic: stage2_state
    control_rate_hz: 20.0
    start_delay_sec: 0.5
    corridor_linear_speed: 0.14
    ring_linear_speed: 0.24
    turn_linear_speed: 0.08
    turn_angular_speed: 0.65
    turn_min_angular_speed: 0.45
    turn_kp: 1.8
    heading_kp: 1.6
    max_angular_speed: 0.8
    distance_tolerance: 0.04
    heading_tolerance_deg: 3.5
    segment_timeout: 25.0
    odd_is_clockwise: true
    clockwise_keywords: 顺时针,cw,clockwise
    counterclockwise_keywords: 逆时针,ccw,counterclockwise
    use_corridor_path: true
    corridor_waypoints_are_global: true
    global_frame_id: map
    corridor_waypoints_json: '[{"x":2.50,"y":3.20,"speed":0.12,"yaw_deg":90.0,"description":"corridor_goal"}]'
    corridor_waypoint_tolerance: 0.18
    corridor_goal_tolerance: 0.10
    corridor_goal_standoff_m: 0.18
    corridor_goal_yaw_tolerance_deg: 6.0
    corridor_path_timeout_sec: 45.0
    pure_pursuit_lookahead_m: 0.45
    pure_pursuit_heading_stop_deg: 70.0
    pure_pursuit_turn_kp: 1.8
    use_occupancy_grid_planner: true
    planner_downsample: 4
    planner_occupied_threshold: 50
    planner_unknown_is_occupied: true
    planner_obstacle_inflation_m: 0.14
    planner_dynamic_obstacle_box_size_m: 0.25
    planner_dynamic_obstacle_inflation_m: 0.04
    planner_dynamic_obstacle_range_m: 0.7
    planner_replan_period_sec: 0.25
    corridor_path_skip_pre_loop_plan: true
    post_corridor_path_plan_json: '[{"type":"pause","duration":0.20,"description":"corridor_arrive_settle"}]'
    pre_loop_plan_json: '[{"type":"turn","angle_deg":90.0,"description":"scan_leave_1"},{"type":"move","distance_m":0.18,"speed":0.08,"description":"scan_leave_2","allow_detour":false},{"type":"turn","angle_deg":90.0,"description":"to_corridor_axis"},{"type":"move","distance_m":1.20,"speed":0.12,"description":"corridor_staging","allow_detour":true},{"type":"pause","duration":0.15,"description":"corridor_staging_settle"},{"type":"pause","duration":0.10,"description":"loop_entry_settle"}]'
    # Map centerline is 3.50 m x 1.15 m; shrink slightly to leave margin during in-place turns.
    loop_long_length_m: 3.42
    loop_short_length_m: 1.08
    exit_distance_m: 1.05
    detour_enabled: true
    detour_obstacle_distance: 0.48
    detour_front_angle_deg: 18.0
    detour_side_center_deg: 65.0
    detour_side_window_deg: 30.0
    detour_min_side_clearance: 0.55
    detour_lateral_distance_m: 0.32
    detour_forward_distance_m: 0.75
    detour_cooldown_sec: 2.0